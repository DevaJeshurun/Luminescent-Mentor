spring.application.name=codementor-ai
server.port=8081

# SQLite Database
spring.datasource.url=jdbc:sqlite:./codementor.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Secrets loaded from application-secrets.properties (gitignored) ──────────
# Copy application-secrets.properties.example → application-secrets.properties
# and fill in your real values. Never commit the secrets file.
spring.config.import=optional:classpath:application-secrets.properties

# JWT (value comes from secrets file)
jwt.secret=${JWT_SECRET:change-me-in-secrets-file}
# JWT token valid for 1 year (365 days) — prevents silent session expiry
jwt.expiration=31536000000

# OpenRouter AI (value comes from secrets file)
openrouter.api.key=${OPENROUTER_API_KEY:change-me-in-secrets-file}
openrouter.api.url=https://openrouter.ai/api/v1
openrouter.model=deepseek/deepseek-chat

# Piston Code Execution
piston.api.url=https://emkc.org/api/v2/piston/execute

# Logging
logging.level.com.codementor=INFO
logging.level.org.springframework.security=WARN
